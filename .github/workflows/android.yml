name: Android

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DIOXUS_CLI_VERSION: "0.7.9"
  TAILWIND_VERSION: "v4.3.0"
  DX_BIN_DIR: .github/bin/dx-0.7.9
  TAILWIND_BIN_DIR: .github/bin/tailwindcss-v4.3.0

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Dioxus CLI
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: ${{ env.DX_BIN_DIR }}
          key: dioxus-cli-${{ env.DIOXUS_CLI_VERSION }}-${{ runner.os }}

      - name: Cache Tailwind CSS CLI
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: ${{ env.TAILWIND_BIN_DIR }}
          key: tailwindcss-${{ env.TAILWIND_VERSION }}-${{ runner.os }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          key: android-ndk-30.0.14904198-${{ runner.os }}

      - name: Install Android NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Check Android target
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
        run: cargo check --target aarch64-linux-android

      - name: Resolve app version and output path
        id: app-version
        run: |
          VERSION=$(awk '/^\s*version\s*=/{gsub(/\"/, "", $3); print $3; exit}' Cargo.toml)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "Release tag mismatch: tag version is v${TAG_VERSION} but Cargo.toml version is ${VERSION}."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_path=dist/NoSaveChat-v${VERSION}-aarch64-linux-android-release.apk" >> "$GITHUB_OUTPUT"

      - name: Install Dioxus CLI
        if: github.event_name != 'pull_request'
        run: |
          if [[ ! -x "$DX_BIN_DIR/bin/dx" ]]; then
            mkdir -p "$DX_BIN_DIR"
            cargo install dioxus-cli --version "$DIOXUS_CLI_VERSION" --locked --root "$DX_BIN_DIR"
          fi
          echo "$PWD/$DX_BIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Install Tailwind CSS CLI
        if: github.event_name != 'pull_request'
        run: |
          if [[ ! -x "$TAILWIND_BIN_DIR/tailwindcss" ]]; then
            mkdir -p "$TAILWIND_BIN_DIR"
            curl -fsSL -o "$TAILWIND_BIN_DIR/tailwindcss" "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
            chmod +x "$TAILWIND_BIN_DIR/tailwindcss"
          fi
          echo "$PWD/$TAILWIND_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build APK
        if: github.event_name != 'pull_request'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
        run: make android-release-build TARGET=aarch64-linux-android PROJECT_VERSION=${{ steps.app-version.outputs.version }}

      - name: Upload APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: NoSaveChat-aarch64-linux-android
          path: ${{ steps.app-version.outputs.apk_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.app-version.outputs.apk_path }}
