name: Android

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DIOXUS_CLI_VERSION: "0.7.9"
  TAILWIND_VERSION: "v4.3.0"
  APK_PATH: dist/NoSaveChat-aarch64-linux-android.apk

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Check Android target
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
        run: cargo check --target aarch64-linux-android

      - name: Install Dioxus CLI
        if: github.event_name != 'pull_request'
        run: cargo install dioxus-cli --version "$DIOXUS_CLI_VERSION" --locked

      - name: Install Tailwind CSS CLI
        if: github.event_name != 'pull_request'
        run: |
          curl -fsSL -o tailwindcss "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss

      - name: Build APK
        if: github.event_name != 'pull_request'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
        run: ./scripts/build-android-apk-with-icon.sh aarch64-linux-android

      - name: Upload APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: NoSaveChat-aarch64-linux-android
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
